<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAOBING // Dev Blog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========================================
   DESIGN TOKENS
   ======================================== */
:root {
  --bg-deep: #0a0a14;
  --bg-surface: #0f0f1e;
  --bg-card: rgba(30, 30, 55, 0.7);
  --royal-blue: #4169E1;
  --royal-blue-glow: rgba(65, 105, 225, 0.4);
  --lemon-yellow: #FFD700;
  --lemon-yellow-glow: rgba(255, 215, 0, 0.3);
  --text-primary: #e0e0f0;
  --text-secondary: #8888aa;
  --text-dim: #555577;
  --glass-bg: rgba(35, 35, 65, 0.82);
  --glass-border: rgba(65, 105, 225, 0.28);
  --glass-border-hover: rgba(65, 105, 225, 0.5);
  --font-mono: 'JetBrains Mono', monospace;
  --font-sans: 'Space Grotesk', sans-serif;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 16px;
  --space-unit: 8px;
  --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ========================================
   RESET & BASE
   ======================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-sans);
  line-height: 1.6;
  overflow-x: hidden;
  cursor: none;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--royal-blue); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--lemon-yellow); }

::selection {
  background: var(--royal-blue);
  color: #fff;
}

a { color: var(--royal-blue); text-decoration: none; transition: color var(--transition-fast); }
a:hover { color: var(--lemon-yellow); }

/* ========================================
   3D GRID BACKGROUND CANVAS
   ======================================== */
#grid-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ========================================
   SCAN LINE OVERLAY
   ======================================== */
.scanlines {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.03) 2px,
    rgba(0, 0, 0, 0.03) 4px
  );
}

/* ========================================
   BACKGROUND TYPOGRAPHY — Right Side Vertical
   ========================================
   - 7 letters stacked in a flex column, filling 100vh
   - Each letter rotated 90deg so bottom faces the right edge
   - Tweak: adjust --letter-size to scale up/down
   - Tweak: adjust opacity for lighter/darker watermark effect
   ======================================== */
.bg-typography {
  position: fixed;
  right: 0;
  top: 0;
  height: 100vh;
  z-index: 1;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: space-evenly;
  padding: 1vh 0;
  user-select: none;
}

.bg-typography span {
  --letter-size: 12vh;
  display: block;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: var(--letter-size);
  color: var(--text-primary);
  opacity: 0.07;
  line-height: 1;
  /* Rotate each letter 90deg clockwise → bottom faces right */
  transform: rotate(90deg);
  /* Compensate for rotation — keep letters tight */
  width: var(--letter-size);
  height: var(--letter-size);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ========================================
   SECTION COMMONS
   ======================================== */
.section {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 32px;
}

.section-label {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--royal-blue);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 16px;
  opacity: 0.8;
}

.section-label::before { content: '// '; }
.section-title {
  font-family: var(--font-mono);
  font-size: clamp(1.5rem, 3vw, 2.2rem);
  font-weight: 700;
  margin-bottom: 48px;
  text-align: center;
  position: relative;
}

.section-title::after {
  content: '';
  display: block;
  width: 60px; height: 2px;
  background: var(--lemon-yellow);
  margin: 16px auto 0;
}

/* ========================================
   HERO / HOMEPAGE (Section 1)
   ======================================== */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 2;
  padding: 80px 80px 80px 96px;
  gap: 64px;
}

.hero-decoration {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  position: absolute;
  opacity: 0.6;
}

.hero-decoration.top-left     { top: 120px; left: 48px; }
.hero-decoration.top-right    { top: 120px; right: 48px; }
.hero-decoration.bottom-left  { bottom: 80px; left: 48px; }
.hero-decoration.bottom-right { bottom: 80px; right: 48px; }

.hero-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 680px;
  z-index: 3;
}

.hero-text-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.hero-line {
  font-family: var(--font-mono);
  font-size: clamp(2.6rem, 5.5vw, 4.8rem);
  font-weight: 700;
  color: var(--text-primary);
  min-height: 1.15em;
  position: relative;
  letter-spacing: -1.5px;
  line-height: 1.1;
}

.hero-line.secondary {
  font-size: clamp(1.4rem, 2.8vw, 2rem);
  font-weight: 400;
  color: var(--text-secondary);
  letter-spacing: -0.5px;
}

.cursor {
  display: inline-block;
  width: 4px;
  height: 0.85em;
  background: var(--lemon-yellow);
  margin-left: 4px;
  vertical-align: text-bottom;
  animation: cursor-blink 0.8s steps(2) infinite;
}

@keyframes cursor-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.cursor.hidden { opacity: 0; animation: none; }

.hero-jump {
  animation: heroJump 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
}

@keyframes heroJump {
  0% { transform: scale(0.8); opacity: 0; }
  60% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}

.hero-subtitle {
  font-family: var(--font-mono);
  font-size: 1.05rem;
  color: var(--text-dim);
  margin-top: 8px;
  opacity: 0;
  animation: fadeInUp 0.6s 2s forwards;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Avatar frame — frosted glass */
.hero-avatar-frame {
  flex: 0 0 auto;
  width: clamp(260px, 34vw, 420px);
  height: clamp(260px, 34vw, 420px);
  border-radius: 50%;
  border: 2px solid var(--glass-border-hover);
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow:
    0 0 40px var(--royal-blue-glow),
    0 0 80px rgba(65, 105, 225, 0.12),
    inset 0 0 30px rgba(65, 105, 225, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 3;
  transition: border-color var(--transition-smooth), box-shadow var(--transition-smooth);
  overflow: hidden;
}

.hero-avatar-frame:hover {
  border-color: var(--lemon-yellow);
  box-shadow:
    0 0 50px var(--lemon-yellow-glow),
    0 0 100px rgba(255, 215, 0, 0.1),
    inset 0 0 40px rgba(255, 215, 0, 0.06);
}

.hero-avatar-placeholder {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.5;
  user-select: none;
}

.hero-avatar-placeholder .icon {
  display: block;
  font-size: 2.4rem;
  margin-bottom: 6px;
  opacity: 0.5;
}

.hero-avatar-frame::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 1px dashed rgba(65, 105, 225, 0.2);
  animation: ringRotate 20s linear infinite;
}

@keyframes ringRotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.hero-scroll-hint {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  animation: floatDown 2s ease-in-out infinite;
  cursor: pointer;
  z-index: 3;
}

@keyframes floatDown {
  0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.4; }
  50% { transform: translateX(-50%) translateY(8px); opacity: 0.8; }
}

/* ========================================
   COVER FLOW / PERSONAL INTRO (Section 2)
   ======================================== */
.coverflow-container {
  width: 100%;
  max-width: 900px;
  height: 420px;
  perspective: 1200px;
  perspective-origin: 50% 50%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.coverflow-track {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  display: flex;
  align-items: center;
  justify-content: center;
}

.coverflow-card {
  position: absolute;
  width: 320px;
  max-width: 80vw;
  padding: 32px 28px;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  text-align: center;
  cursor: pointer;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              border-color 0.3s ease,
              box-shadow 0.3s ease;
  user-select: none;
}

.coverflow-card.active {
  border-color: var(--glass-border-hover);
  box-shadow: 0 0 40px var(--royal-blue-glow), 0 0 80px rgba(65, 105, 225, 0.1);
}

.coverflow-card-icon {
  font-size: 2.2rem;
  margin-bottom: 16px;
  display: block;
  font-family: var(--font-mono);
}

.coverflow-card-title {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 12px;
}

.coverflow-card-desc {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

.coverflow-nav {
  display: flex;
  gap: 24px;
  margin-top: 24px;
  z-index: 10;
}

.coverflow-nav button {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text-primary);
  font-size: 1.2rem;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}

.coverflow-nav button:hover {
  border-color: var(--royal-blue);
  box-shadow: 0 0 20px var(--royal-blue-glow);
  color: var(--lemon-yellow);
}

.coverflow-dots {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

.coverflow-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-dim);
  border: none;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.coverflow-dot.active {
  background: var(--lemon-yellow);
  box-shadow: 0 0 8px var(--lemon-yellow-glow);
  width: 24px;
  border-radius: 4px;
}

/* ========================================
   GALLERY CAROUSEL (Section 3) - Center Focus
   ======================================== */
.gallery-stage {
  position: relative;
  width: 100%;
  max-width: 900px;
  height: 420px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.gallery-card {
  position: absolute;
  width: 360px;
  max-width: 72vw;
  height: 380px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  overflow: hidden;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              border-color 0.3s ease,
              box-shadow 0.3s ease;
  cursor: pointer;
  display: flex;
  flex-direction: column;
}

.gallery-card.focused {
  border-color: var(--glass-border-hover);
  box-shadow: 0 0 40px var(--royal-blue-glow), 0 8px 32px rgba(0, 0, 0, 0.5);
  z-index: 10;
}

.gallery-card-image {
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 3rem;
  color: rgba(255,255,255,0.15);
  position: relative;
  overflow: hidden;
}

.gallery-card-image::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(to top, var(--bg-surface), transparent);
}

.gallery-card-info {
  padding: 20px 24px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.gallery-card-info h3 {
  font-family: var(--font-mono);
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
}

.gallery-card-info p {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.4;
}

.gallery-card-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 4px 10px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  color: var(--royal-blue);
  margin-top: auto;
  align-self: flex-start;
}

.gallery-controls {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-top: 12px;
}

.gallery-controls button {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text-primary);
  font-size: 1.3rem;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}

.gallery-controls button:hover {
  border-color: var(--royal-blue);
  box-shadow: 0 0 20px var(--royal-blue-glow);
  color: var(--lemon-yellow);
}

.gallery-indicator {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--text-secondary);
}

/* ========================================
   FRIEND LINKS (Section 4) - Cascade
   ======================================== */
.friend-links-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
  width: 100%;
  max-width: 1000px;
}

.friend-link-card {
  padding: 24px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: all var(--transition-fast);
  cursor: pointer;
  opacity: 0;
  transform: translateY(30px);
}

.friend-link-card.visible {
  animation: cascadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes cascadeIn {
  to { opacity: 1; transform: translateY(0); }
}

.friend-link-card:hover {
  border-color: var(--glass-border-hover);
  box-shadow: 0 4px 24px var(--royal-blue-glow);
  transform: translateY(-4px);
}

.friend-link-card:hover .friend-link-arrow {
  transform: translateX(4px);
  color: var(--lemon-yellow);
}

.friend-link-name {
  font-family: var(--font-mono);
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.friend-link-desc {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 16px;
  line-height: 1.4;
}

.friend-link-arrow {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--royal-blue);
  transition: all var(--transition-fast);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

/* ========================================
   FOOTER
   ======================================== */
.footer {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 48px 32px;
  border-top: 1px solid var(--glass-border);
}

.footer-text {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-dim);
}

.footer-text .accent { color: var(--royal-blue); }

/* ========================================
   GLASSMORPHISM ID CARD (floating)
   ======================================== */
.glass-id-card {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 100;
  padding: 12px 20px;
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all var(--transition-fast);
  cursor: pointer;
}

.glass-id-card:hover {
  border-color: var(--royal-blue);
  box-shadow: 0 0 24px var(--royal-blue-glow);
}

.glass-id-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--lemon-yellow);
  box-shadow: 0 0 8px var(--lemon-yellow-glow);
  animation: dotPulse 2s ease-in-out infinite;
}

@keyframes dotPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ========================================
   CUSTOM CURSOR & CLICK PARTICLES
   ======================================== */
.custom-cursor {
  position: fixed;
  top: 0; left: 0;
  width: 3px; height: 3px;
  z-index: 99999;
  pointer-events: none;
  background: transparent;
  transform: rotate(28deg);
  animation: reticleBlink 0.11s steps(2) infinite;
}

.custom-cursor.clicking {
  animation: none;
  opacity: 1;
}

@keyframes reticleBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.15; }
}

.click-particle {
  position: fixed;
  z-index: 99998;
  pointer-events: none;
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 700;
  line-height: 1;
  animation: particleScatter 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  white-space: nowrap;
}

@keyframes particleScatter {
  0% {
    opacity: 1;
    transform: translate(0, 0) scale(1);
  }
  30% {
    opacity: 1;
    transform: translate(var(--dx30), var(--dy30)) scale(1.3);
  }
  100% {
    opacity: 0;
    transform: translate(var(--dx), var(--dy)) scale(0.4);
  }
}

/* ========================================
   RESPONSIVE
   ======================================== */
@media (max-width: 768px) {
  .hero-decoration { display: none; }
  .hero { flex-direction: column-reverse; padding: 100px 24px 60px; gap: 32px; justify-content: center; text-align: center; }
  .hero-left { align-items: center; text-align: center; max-width: 100%; }
  .hero-text-container { align-items: center; }
  .hero-line { font-size: clamp(1.8rem, 8vw, 2.8rem) !important; }
  .hero-line.secondary { font-size: clamp(1rem, 5vw, 1.4rem) !important; }
  .hero-avatar-frame { width: 200px; height: 200px; }
  .hero-subtitle { text-align: center; }

  .coverflow-container { height: 360px; }
  .coverflow-card { width: 260px; padding: 24px 20px; }

  .gallery-card { width: 300px; max-width: 75vw; height: 340px; }
  .gallery-stage { height: 380px; }

  .friend-links-grid {
    grid-template-columns: 1fr;
  }

  .glass-id-card { bottom: 12px; right: 12px; font-size: 0.7rem; }
}

@media (max-width: 480px) {
  .section { padding: 60px 16px; }
  .coverflow-container { height: 320px; }
  .coverflow-card { width: 240px; padding: 20px 16px; }
}
</style>
</head>
<body>

<!-- 3D GRID BACKGROUND -->
<canvas id="grid-canvas"></canvas>
<div class="scanlines"></div>

<!-- BACKGROUND TYPOGRAPHY — under avatar, right side -->
<div class="bg-typography">
  <span>M</span><span>A</span><span>O</span><span>B</span><span>I</span><span>N</span><span>G</span>
</div>

<!-- SECTION 1: HERO -->
<section class="hero" id="home">
  <div class="hero-decoration top-left">/* v2.0.1 */</div>
  <div class="hero-decoration top-right">&lt;header&gt;</div>

<script>
/* ========================================
   3D CYBER GRID BACKGROUND
   ======================================== */
(function() {
  const canvas = document.getElementById('grid-canvas');
  const ctx = canvas.getContext('2d');
  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let targetMouseX = mouseX;
  let targetMouseY = mouseY;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  document.addEventListener('mousemove', (e) => {
    targetMouseX = e.clientX;
    targetMouseY = e.clientY;
  });

  function draw() {
    const w = canvas.width;
    const h = canvas.height;

    // Smooth mouse follow
    mouseX += (targetMouseX - mouseX) * 0.05;
    mouseY += (targetMouseY - mouseY) * 0.05;

    // Vanishing point shifted by mouse
    const vpX = w / 2 + (mouseX - w / 2) * 0.15;
    const vpY = h * 0.35 + (mouseY - h / 2) * 0.08;

    ctx.clearRect(0, 0, w, h);

    // Draw horizontal grid lines (floor perspective)
    const numHLines = 30;
    const startY = vpY + 40;
    const endY = h + 200;

    for (let i = 0; i < numHLines; i++) {
      const t = i / numHLines;
      const y = startY + (endY - startY) * Math.pow(t, 2.2);

      if (y > h + 100) continue;

      const alpha = 0.08 + 0.12 * (1 - t);
      const lineWidth = 0.5 + 1 * (1 - t);

      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.strokeStyle = `rgba(65, 105, 225, ${alpha})`;
      ctx.lineWidth = lineWidth;
      ctx.shadowColor = `rgba(65, 105, 225, ${alpha * 0.5})`;
      ctx.shadowBlur = 3 * (1 - t);
      ctx.stroke();
    }

    // Draw vertical radiating lines
    const numVLines = 40;
    for (let i = 0; i < numVLines; i++) {
      const t = i / (numVLines - 1);
      const angle = -Math.PI / 2 + (-Math.PI / 2.8) + t * (Math.PI / 1.4);
      const dx = Math.cos(angle);
      const dy = Math.sin(angle);

      const farDist = h * 2.5;
      const endX = vpX + dx * farDist;
      const endY = vpY + dy * farDist;

      const alpha = 0.03 + 0.06 * Math.abs(t - 0.5) * 2;

      ctx.beginPath();
      ctx.moveTo(vpX, vpY);
      ctx.lineTo(endX, endY);
      ctx.strokeStyle = `rgba(65, 105, 225, ${alpha})`;
      ctx.lineWidth = 0.5;
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.stroke();
    }

    // Vanishing point glow
    const glow = ctx.createRadialGradient(vpX, vpY, 0, vpX, vpY, 80);
    glow.addColorStop(0, 'rgba(65, 105, 225, 0.08)');
    glow.addColorStop(1, 'rgba(65, 105, 225, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(vpX - 80, vpY - 80, 160, 160);

    // Extra accent lines near horizon
    ctx.beginPath();
    ctx.moveTo(vpX - 200, vpY);
    ctx.lineTo(vpX + 200, vpY);
    ctx.strokeStyle = 'rgba(255, 215, 0, 0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    requestAnimationFrame(draw);
  }

  draw();
})();

/* ========================================
   TYPEWRITER + TEXT CAROUSEL
   ======================================== */
(function() {
  const textPairs = [
    ['Hello, World.', 'I build things for the web.'],
    ['>_ ./think.sh', 'Exploring code & creativity.'],
    ['// TODO: Change the world', 'One commit at a time.'],
    ['while (true) {', '  learn(); create(); share(); }'],
    ['const dream = reality', '// under construction'],
  ];

  const line1El = document.getElementById('heroLine1');
  const line2El = document.getElementById('heroLine2');
  let pairIndex = 0;
  let cursorEl = null;
  let isTyping = false;

  function createCursor(parent) {
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    parent.appendChild(cursor);
    return cursor;
  }

  function removeCursor() {
    if (cursorEl) { cursorEl.remove(); cursorEl = null; }
  }

  function typeText(el, text, speed, callback) {
    let i = 0;
    el.textContent = '';
    cursorEl = createCursor(el);

    function tick() {
      if (i < text.length) {
        el.textContent += text[i];
        i++;
        const delay = text[i - 1] === ' ' ? speed * 2 : speed + Math.random() * 40;
        setTimeout(tick, delay);
      } else {
        if (callback) callback();
      }
    }

    setTimeout(tick, 200);
  }

  function typePair(pair) {
    if (isTyping) return;
    isTyping = true;

    // Jump animation before typing
    const container = document.getElementById('heroText');
    container.classList.add('hero-jump');
    setTimeout(() => container.classList.remove('hero-jump'), 300);

    removeCursor();
    line1El.textContent = '';
    line2El.textContent = '';

    typeText(line1El, pair[0], 60, () => {
      typeText(line2El, pair[1], 50, () => {
        isTyping = false;
        // Pause then carousel to next
        setTimeout(() => {
          pairIndex = (pairIndex + 1) % textPairs.length;
          typePair(textPairs[pairIndex]);
        }, 3000);
      });
    });
  }

  // Start
  setTimeout(() => typePair(textPairs[0]), 500);
})();

/* ========================================
   COVER FLOW
   ======================================== */
(function() {
  const cards = [
    { icon: '</>', title: 'Full-Stack Developer', desc: 'Building end-to-end solutions with React, Vue, Node.js, and cloud-native technologies. Turning ideas into scalable products.' },
    { icon: '{ }', title: 'Open Source Contributor', desc: 'Active in the open-source community. Believing code wants to be free and collaboration drives innovation forward.' },
    { icon: '/*!', title: 'Tech Blogger', desc: 'Sharing insights through technical articles. Making complex concepts accessible with clear explanations and practical examples.' },
    { icon: '[]', title: 'UI/UX Crafter', desc: 'Obsessed with pixel-perfect interfaces and smooth interactions. Design is not just how it looks, but how it works.' },
    { icon: '>>', title: 'Lifelong Learner', desc: 'Constantly exploring emerging technologies, from AI to WebAssembly. The best investment is in knowledge.' },
  ];

  const track = document.getElementById('coverflowTrack');
  const dotsContainer = document.getElementById('coverflowDots');
  let activeIndex = 2;

  function render() {
    track.innerHTML = '';
    dotsContainer.innerHTML = '';

    cards.forEach((card, i) => {
      const el = document.createElement('div');
      el.className = 'coverflow-card' + (i === activeIndex ? ' active' : '');
      el.innerHTML = `
        <span class="coverflow-card-icon">${card.icon}</span>
        <h3 class="coverflow-card-title">${card.title}</h3>
        <p class="coverflow-card-desc">${card.desc}</p>
      `;
      el.addEventListener('click', () => setActive(i));

      const offset = i - activeIndex;
      const absOff = Math.abs(offset);
      const sign = offset === 0 ? 0 : offset > 0 ? 1 : -1;

      const translateX = offset * 280;
      const rotateY = sign * absOff * 35;
      const translateZ = -absOff * 180;
      const scale = 1 - absOff * 0.12;
      const opacity = absOff === 0 ? 1 : absOff === 1 ? 0.7 : 0.35;
      const zIndex = 10 - absOff;

      el.style.transform = `translateX(${translateX}px) rotateY(${rotateY}deg) translateZ(${translateZ}px) scale(${scale})`;
      el.style.opacity = Math.max(0, opacity);
      el.style.zIndex = zIndex;
      el.style.pointerEvents = absOff <= 1 ? 'auto' : 'none';

      track.appendChild(el);

      // Dot
      const dot = document.createElement('button');
      dot.className = 'coverflow-dot' + (i === activeIndex ? ' active' : '');
      dot.addEventListener('click', () => setActive(i));
      dot.setAttribute('aria-label', `Go to card ${i + 1}`);
      dotsContainer.appendChild(dot);
    });
  }

  function setActive(i) {
    if (i < 0) i = cards.length - 1;
    if (i >= cards.length) i = 0;
    activeIndex = i;
    render();
  }

  document.getElementById('cfPrev').addEventListener('click', () => setActive(activeIndex - 1));
  document.getElementById('cfNext').addEventListener('click', () => setActive(activeIndex + 1));

  // Keyboard (only when coverflow section is visible)
  document.addEventListener('keydown', (e) => {
    const rect = document.getElementById('coverflowContainer').getBoundingClientRect();
    if (rect.top > window.innerHeight || rect.bottom < 0) return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); setActive(activeIndex - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); setActive(activeIndex + 1); }
  });

  // Touch swipe
  let touchStartX = 0;
  track.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
  track.addEventListener('touchend', (e) => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) {
      setActive(activeIndex + (diff > 0 ? 1 : -1));
    }
  });

  render();
})();

/* ========================================
   GALLERY CAROUSEL - Center Focus
   ======================================== */
(function() {
  const projects = [
    { title: 'Project Alpha', desc: 'Real-time collaborative editor with WebSocket sync and CRDT-based conflict resolution.', tag: 'React / Node.js', color: '#4169E1' },
    { title: 'Project Beta', desc: 'ML model visualization dashboard with interactive data flow graphs.', tag: 'Python / D3.js', color: '#FFD700' },
    { title: 'Project Gamma', desc: 'High-performance CLI framework for automating DevOps workflows.', tag: 'Rust / Go', color: '#00CED1' },
    { title: 'Project Delta', desc: 'Mobile-first design system with 50+ accessible components.', tag: 'Vue / Storybook', color: '#FF6B6B' },
    { title: 'Project Epsilon', desc: 'Cloud infrastructure monitoring with real-time alerting and auto-scaling.', tag: 'AWS / Terraform', color: '#7B68EE' },
    { title: 'Project Zeta', desc: 'Developer productivity toolkit with smart code generation and refactoring tools.', tag: 'TypeScript / AST', color: '#2ECC71' },
  ];

  const stage = document.getElementById('galleryStage');
  const indicator = document.getElementById('galIndicator');
  let activeIndex = 0;
  const cards = [];

  function createCards() {
    stage.innerHTML = '';
    cards.length = 0;
    projects.forEach((proj, i) => {
      const el = document.createElement('div');
      el.className = 'gallery-card';
      el.innerHTML = `
        <div class="gallery-card-image" style="background:linear-gradient(135deg, ${proj.color}22, ${proj.color}08)">
          <span style="font-size:4rem;opacity:0.15;font-family:var(--font-mono)">{${i}}</span>
        </div>
        <div class="gallery-card-info">
          <h3>${proj.title}</h3>
          <p>${proj.desc}</p>
          <span class="gallery-card-tag">${proj.tag}</span>
        </div>
      `;
      el.addEventListener('click', () => {
        if (i !== activeIndex) setActive(i);
      });
      stage.appendChild(el);
      cards.push(el);
    });
    updatePositions();
  }

  function updatePositions() {
    cards.forEach((card, i) => {
      const offset = i - activeIndex;
      const absOff = Math.abs(offset);
      const sign = offset === 0 ? 0 : offset > 0 ? 1 : -1;

      card.classList.toggle('focused', offset === 0);

      if (absOff === 0) {
        card.style.transform = 'translateX(0) scale(1)';
        card.style.opacity = '1';
        card.style.zIndex = '10';
        card.style.pointerEvents = 'auto';
        card.style.filter = 'none';
      } else if (absOff === 1) {
        const x = sign * 56 + '%';
        card.style.transform = `translateX(${x}) scale(0.82)`;
        card.style.opacity = '0.55';
        card.style.zIndex = '5';
        card.style.pointerEvents = 'auto';
        card.style.filter = 'brightness(0.7)';
      } else {
        const x = sign * 72 + '%';
        card.style.transform = `translateX(${x}) scale(0.65)`;
        card.style.opacity = '0';
        card.style.zIndex = '1';
        card.style.pointerEvents = 'none';
        card.style.filter = 'brightness(0.5)';
      }
    });

    indicator.textContent = `${activeIndex + 1} / ${projects.length}`;
  }

  function setActive(i) {
    if (i < 0) i = projects.length - 1;
    if (i >= projects.length) i = 0;
    activeIndex = i;
    updatePositions();
  }

  document.getElementById('galPrev').addEventListener('click', () => setActive(activeIndex - 1));
  document.getElementById('galNext').addEventListener('click', () => setActive(activeIndex + 1));

  // Touch swipe
  let touchStartX = 0;
  stage.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
  stage.addEventListener('touchend', (e) => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) setActive(activeIndex + (diff > 0 ? 1 : -1));
  });

  // Mouse drag
  let isDragging = false;
  let dragStartX = 0;
  stage.addEventListener('mousedown', (e) => {
    isDragging = true;
    dragStartX = e.clientX;
    cards.forEach(c => { c.style.transition = 'none'; });
  });
  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    e.preventDefault();
  });
  window.addEventListener('mouseup', (e) => {
    if (!isDragging) return;
    isDragging = false;
    cards.forEach(c => { c.style.transition = ''; });
    const diff = dragStartX - e.clientX;
    if (Math.abs(diff) > 60) {
      setActive(activeIndex + (diff > 0 ? 1 : -1));
    }
  });

  // Keyboard navigation when gallery is in view
  document.addEventListener('keydown', (e) => {
    const rect = stage.getBoundingClientRect();
    const inView = rect.top < window.innerHeight && rect.bottom > 0;
    if (!inView) return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); setActive(activeIndex - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); setActive(activeIndex + 1); }
  });

  createCards();
  window.addEventListener('resize', updatePositions);
})();

/* ========================================
   FRIEND LINKS - CASCADE ANIMATION
   ======================================== */
(function() {
  const links = [
    { name: 'TechBlog Pro', desc: '前沿技术深度解析与行业趋势洞察', url: '#' },
    { name: 'Code & Beyond', desc: '编程技巧、架构设计与最佳实践分享', url: '#' },
    { name: 'Pixel Perfect', desc: 'UI/UX 设计灵感与前端动效探索', url: '#' },
    { name: 'Data Driven', desc: '数据科学、机器学习与可视化技术', url: '#' },
    { name: 'Open Dev', desc: '开源项目、社区贡献与开发者工具', url: '#' },
    { name: 'Cloud Native', desc: '云原生架构、DevOps 与基础设施', url: '#' },
  ];

  const grid = document.getElementById('friendLinksGrid');

  links.forEach((link, i) => {
    const el = document.createElement('a');
    el.className = 'friend-link-card';
    el.href = link.url;
    el.style.animationDelay = `${i * 0.1}s`;
    el.innerHTML = `
      <div class="friend-link-name">${link.name}</div>
      <div class="friend-link-desc">${link.desc}</div>
      <div class="friend-link-arrow">visit &rarr;</div>
    `;
    grid.appendChild(el);
  });

  // Intersection Observer for cascade trigger
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const cards = grid.querySelectorAll('.friend-link-card');
        cards.forEach((card, i) => {
          card.style.animationDelay = `${i * 0.1}s`;
          card.classList.add('visible');
        });
      } else {
        // Reset for re-trigger
        grid.querySelectorAll('.friend-link-card').forEach(c => c.classList.remove('visible'));
      }
    });
  }, { threshold: 0.2 });

  observer.observe(grid);
})();

/* ========================================
   CUSTOM CURSOR — Minecraft Diamond Sword
   ======================================== */
(function() {
  const PX = 3; // pixel size

  // Pixel-art diamond sword grid: 11 cols × 16 rows
  // # = diamond blade cyan, L = light highlight, D = dark shadow, B = brown handle
  const SWORD = [
    '....###....',   //  0  tip
    '...#####...',   //  1
    '..#######..',   //  2
    '.##L###D##.',   //  3
    '.##L###D##.',   //  4  blade widest
    '.###L#D###.',   //  5
    '.####D####.',   //  6
    '.###...###.',   //  7  guard notch
    '.###...###.',   //  8
    '..##...##..',   //  9
    '..#######..',   // 10  guard bottom
    '..##BBB##..',   // 11  handle top
    '...BBBBB...',   // 12
    '...BBBBB...',   // 13  handle
    '....BBB....',   // 14
    '....BBB....',   // 15  handle end
  ];

  const COLORS = {
    '#': '#5CEFE7',  // diamond blade cyan
    'L': '#B3FCF7',  // light highlight
    'D': '#3DB8B0',  // dark shadow (3D edge)
    'B': '#5C3A1E',  // brown handle
  };

  const YELLOW_MAP = {
    '#': '#FFD700',
    'L': '#FFED80',
    'D': '#CCB000',
    'B': '#8B7320',
  };

  function buildBoxShadow(colorMap) {
    const cols = SWORD[0].length;
    const rows = SWORD.length;
    const cx = Math.floor(cols / 2); // center col
    const cy = Math.floor(rows / 2); // center row
    const parts = [];

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const ch = SWORD[r][c];
        if (ch === '.') continue;
        const color = colorMap[ch] || '#5CEFE7';
        const x = (c - cx) * PX;
        const y = (r - cy) * PX;
        parts.push(`${x}px ${y}px 0 ${color}`);
      }
    }
    return parts.join(', ');
  }

  const normalShadow = buildBoxShadow(COLORS);
  const clickShadow = buildBoxShadow(YELLOW_MAP);

  const cursor = document.createElement('div');
  cursor.className = 'custom-cursor';
  cursor.style.boxShadow = normalShadow;
  document.body.appendChild(cursor);

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let isClicking = false;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    cursor.style.left = mouseX + 'px';
    cursor.style.top = mouseY + 'px';
  });

  document.addEventListener('mouseleave', () => { cursor.style.opacity = '0'; });
  document.addEventListener('mouseenter', () => { cursor.style.opacity = ''; });

  // Click: flash sword yellow + spawn particles
  document.addEventListener('click', (e) => {
    if (isClicking) return;
    isClicking = true;

    const cx = e.clientX;
    const cy = e.clientY;

    cursor.style.boxShadow = clickShadow;
    cursor.classList.add('clicking');

    const chars = ['0', '1', '!', '0', '1', '>', '<', '/'];
    const particleCount = 16;

    for (let i = 0; i < particleCount; i++) {
      const p = document.createElement('span');
      p.className = 'click-particle';
      p.textContent = chars[Math.floor(Math.random() * chars.length)];

      const angle = (Math.PI * 2 * i) / particleCount + (Math.random() - 0.5) * 0.4;
      const distance = 50 + Math.random() * 70;
      const dx = Math.cos(angle) * distance;
      const dy = Math.sin(angle) * distance;

      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      p.style.setProperty('--dx', dx + 'px');
      p.style.setProperty('--dy', dy + 'px');
      p.style.setProperty('--dx30', (dx * 0.3) + 'px');
      p.style.setProperty('--dy30', (dy * 0.3) + 'px');

      const isBlue = i % 2 === 0;
      p.style.color = isBlue ? '#4169E1' : '#FFD700';
      p.style.textShadow = isBlue
        ? '0 0 8px rgba(65,105,225,0.8), 0 0 20px rgba(65,105,225,0.4)'
        : '0 0 8px rgba(255,215,0,0.8), 0 0 20px rgba(255,215,0,0.4)';

      document.body.appendChild(p);
      setTimeout(() => p.remove(), 750);
    }

    setTimeout(() => {
      cursor.style.boxShadow = normalShadow;
      cursor.classList.remove('clicking');
      isClicking = false;
    }, 130);
  });

  cursor.style.left = mouseX + 'px';
  cursor.style.top = mouseY + 'px';
})();
